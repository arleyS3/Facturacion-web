spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:./src/backend/api/.env[.properties]
      - optional:file:${user.dir}/src/backend/api/.env[.properties]
  application:
    name: central-fianzas

  # DataSource (PostgreSQL / Supabase)
  datasource:
    url: ${DB_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      initialization-fail-timeout: 10000
      leak-detection-threshold: 60000
      data-source-properties:
        preferQueryMode: simple
        ApplicationName: central-fianzas-api
        prepareThreshold: 0

  # JPA / Hibernate
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        connection:
          autocommit: true
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

sunat:
  api:
    base-url: ${SUNAT_API_URL}
    token: ${SUNAT_API_TOKEN}

# Encriptación de datos sensibles (contraseñas de certificados)
app:
  encryption:
    key: ${ENCRYPTION_KEY}
  # certificate.default-alias: Eliminado - en prod viene de BD (tabla configuracion_certificado)

# Server
server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}

# OSE (Operador de Servicios Electrónicos) - DBNet / eComprobantes
ose:
  endpoint:
    url: https://pruebas.ecomprobantes.pe/wssCustomerETDLoadBDUBL21/CustomerETDLoadASP.asmx
